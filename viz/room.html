<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Séance — Room</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0A0A0A;
      color: #A0A0A0;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      cursor: grab;
    }

    body:active { cursor: grabbing; }

    #canvas3d {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* --- Stats panel (left) --- */
    #stats {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
      pointer-events: none;
      max-width: 280px;
    }

    #stats h1 {
      font-size: 13px;
      letter-spacing: 3px;
      color: #FFB347;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .stat-section {
      margin-bottom: 14px;
    }

    .stat-section h2 {
      font-size: 9px;
      letter-spacing: 2px;
      color: #FF8C00;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      line-height: 1.6;
      color: #666;
    }

    .stat-row .val {
      color: #A0A0A0;
      text-align: right;
    }

    .stat-row.active .val { color: #FFB347; }
    .stat-row.disturbed .val { color: #FF5014; }

    /* --- Narrative (bottom) --- */
    #narrative {
      position: fixed;
      bottom: 24px;
      left: 24px;
      right: 24px;
      z-index: 10;
      pointer-events: none;
    }

    #narrative-text {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
      font-style: italic;
      transition: color 0.5s;
    }

    #narrative-text.active { color: #A0A0A0; }

    /* --- Connection indicator --- */
    #connection {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 10;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .conn-live { color: #00FF80; }
    .conn-mock { color: #FF8C00; }
    .conn-dead { color: #FF0000; }

    /* --- Controls hint --- */
    #controls-hint {
      position: fixed;
      bottom: 60px;
      right: 24px;
      z-index: 10;
      font-size: 9px;
      color: #333;
      text-align: right;
      line-height: 1.8;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="canvas3d"></div>

  <div id="stats">
    <h1>&#x26B5; S&eacute;ance</h1>
    <div class="stat-section">
      <h2>&#x25C8; Room</h2>
      <div class="stat-row"><span>Candles</span><span class="val" id="s-candles">—</span></div>
      <div class="stat-row"><span>Sensors</span><span class="val" id="s-sensors">—</span></div>
      <div class="stat-row"><span>Signal Paths</span><span class="val" id="s-paths">—</span></div>
    </div>
    <div class="stat-section">
      <h2>&#x25C8; Perception</h2>
      <div class="stat-row"><span>Packets/sec</span><span class="val" id="s-pps">—</span></div>
      <div class="stat-row"><span>Unique MACs</span><span class="val" id="s-macs">—</span></div>
      <div class="stat-row"><span>Disturbances</span><span class="val" id="s-disturb">—</span></div>
    </div>
    <div class="stat-section">
      <h2>&#x25C8; Candle Paths</h2>
      <div id="candle-stats"></div>
    </div>
  </div>

  <div id="connection" class="conn-mock">&#x25CF; mock data</div>

  <div id="narrative">
    <div id="narrative-text">Listening for electromagnetic whispers...</div>
  </div>

  <div id="controls-hint">
    drag to rotate<br>
    scroll to zoom<br>
    right-drag to pan
  </div>

  <script type="module" src="seance-3d.js"></script>
</body>
</html>
